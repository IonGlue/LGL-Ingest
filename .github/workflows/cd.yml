name: CD — Build & Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lgl-uplink-portal

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger server deploy via webhook
        # The portal server runs auto-deploy.sh as a webhook listener on port 9000.
        # Set DEPLOY_WEBHOOK_URL in repository secrets (e.g. https://portal.example.com/deploy).
        # Set DEPLOY_WEBHOOK_SECRET to match the server's WEBHOOK_SECRET env var.
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          PAYLOAD="{\"image\":\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\",\"digest\":\"${{ needs.build-and-push.outputs.image_digest }}\"}"
          SIG=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sSf \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: sha256=${SIG}" \
            -d "${PAYLOAD}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            || echo "Webhook not reachable — deploy manually: ssh server 'systemctl start portal-deploy.service'"

      - name: Summary
        run: |
          echo "### Deployment triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: \`${{ needs.build-and-push.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If the webhook is not set up yet, SSH into the server and run:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "systemctl start portal-deploy.service" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
